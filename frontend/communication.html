<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add information - Communication</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container communication-page">
    <h1>Add information</h1>
    <p class="text-muted">Record: <span id="recordIdDisplay"></span> &nbsp;|&nbsp; Visit date: <span id="visitDateDisplay"></span></p>

    <form id="communicationForm" class="communication-form" novalidate>

      <!-- Q1 -->
      <div class="form-step" id="step1">
        <label>1. Hard Copy Received at RO?</label>
        <select id="hardCopyReceived">
          <option value="">-- Select --</option>
          <option value="Received">Received</option>
          <option value="Not Received">Not Received</option>
        </select>
      </div>

      <!-- Q2 -->
      <div class="form-step hidden" id="step2">
        <label>2. Hard Copy Received Date</label>
        <input type="date" id="hardCopyReceivedDate">
      </div>

      <!-- Q3 -->
      <div class="form-step hidden" id="step3">
        <label>3. Show Cause Notice Issued or Not Issued</label>
        <select id="soCauseNoticeIssued">
          <option value="">-- Select --</option>
          <option value="Issued">Issued</option>
          <option value="Not Issued">Not Issued</option>
        </select>
      </div>

      <!-- Q4a: Not Issued branch -->
      <div class="form-step hidden" id="step4a">
        <label>4. Closer Date</label>
        <input type="date" id="closerDateNotIssued">
      </div>

      <!-- Q4b: Issued branch -->
      <div class="form-step hidden" id="step4b">
        <label>4. Target Show Cause Date <small class="auto-hint">(Hard Copy Received Date + 15 days)</small></label>
        <input type="date" id="targetSoCauseDate" readonly class="readonly-date">

        <label>Show Cause Notice Issued Date</label>
        <input type="date" id="soCauseNoticeIssuedDate">

        <label>Reminder 1</label>
        <input type="date" id="reminder1">

        <label>Reminder 2</label>
        <input type="date" id="reminder2">
      </div>

      <!-- Q5 -->
      <div class="form-step hidden" id="step5">
        <label>5. Dealer Reply Target Date <small class="auto-hint">(Show Cause Notice Issued Date + 15 days)</small></label>
        <input type="date" id="dealerReplyTargetDate" readonly class="readonly-date">
      </div>

      <!-- Q6 -->
      <div class="form-step hidden" id="step6">
        <label>6. Dealer Replied</label>
        <select id="dealerReplied">
          <option value="">-- Select --</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>

      <!-- Q7 -->
      <div class="form-step hidden" id="step7">
        <label>7. Dealer Reply Received Date</label>
        <input type="date" id="dealerReplyReceivedDate">
      </div>

      <!-- Q8 -->
      <div class="form-step hidden" id="step8">
        <label>8. Show Cause Notice – Dealer Reply Satisfactory</label>
        <select id="dealerReplySatisfactory">
          <option value="">-- Select --</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>

      <!-- Q9a: Satisfactory = Yes -->
      <div class="form-step hidden" id="step9a">
        <label>9. Closer Date</label>
        <input type="date" id="closerDateSatisfactory">
      </div>

      <!-- Q9b-Q13: Satisfactory = No -->
      <div class="form-step hidden" id="step9b">
        <label>9. Speaking Order Target Date <small class="auto-hint">(Dealer Reply Received Date + 15 days)</small></label>
        <input type="date" id="speakingOrderTargetDate" readonly class="readonly-date">

        <label>Speaking Order – Major / Minor</label>
        <select id="speakingOrderType">
          <option value="">-- Select --</option>
          <option value="Major">Major</option>
          <option value="Minor">Minor</option>
        </select>

        <label>Speaking Order Date</label>
        <input type="date" id="speakingOrderDate">

        <label>Clause Details</label>
        <table class="clause-table" id="clauseTable">
          <thead>
            <tr><th>Clause No / Description</th><th>Nos</th><th>Amount</th></tr>
          </thead>
          <tbody id="clauseTableBody">
            <tr><td><input type="text" class="clause-desc"></td><td><input type="text" class="clause-nos"></td><td><input type="text" class="clause-amt"></td></tr>
            <tr><td><input type="text" class="clause-desc"></td><td><input type="text" class="clause-nos"></td><td><input type="text" class="clause-amt"></td></tr>
            <tr><td><input type="text" class="clause-desc"></td><td><input type="text" class="clause-nos"></td><td><input type="text" class="clause-amt"></td></tr>
          </tbody>
        </table>
        <button type="button" class="btn btn-add-row" id="addClauseRow">+ Add Row</button>

        <label>Remark</label>
        <textarea id="remark1" rows="3" placeholder="Enter remark..."></textarea>

        <label>Speaking Order Reply by Dealer Target Date <small class="auto-hint">(Speaking Order Date + 15 days)</small></label>
        <input type="date" id="speakingOrderReplyTargetDate" readonly class="readonly-date">

        <label>10. Reply Received from Dealer</label>
        <input type="text" id="replyFromDealer" placeholder="Enter reply details...">

        <label>Reply Date</label>
        <input type="date" id="replyFromDealerDate">

        <label>11. Penalty Recovery Date</label>
        <input type="date" id="penaltyRecoveryDate">

        <label>Penalty Recovery Amount</label>
        <input type="text" id="penaltyRecoveryAmount" placeholder="Amount">

        <label>12. Remark</label>
        <textarea id="remark2" rows="3" placeholder="Enter remark..."></textarea>

        <label>13. File Closer</label>
        <select id="fileCloser">
          <option value="">-- Select --</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>

        <div class="hidden" id="closingDateWrap">
          <label>Closing Date</label>
          <input type="date" id="closingDate">
        </div>
      </div>

      <button type="submit" class="btn" id="saveBtn">Save</button>
    </form>
    <p class="error-msg hidden" id="errorMsg"></p>
    <p class="success-msg hidden" id="successMsg"></p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var recordId = params.get('recordId');
      var visitDate = params.get('visitDate');
      document.getElementById('recordIdDisplay').textContent = recordId || '(none)';
      document.getElementById('visitDateDisplay').textContent = visitDate || '(select visit date)';

      if (!recordId || !visitDate) {
        document.getElementById('errorMsg').textContent = 'Record ID and Visit date are required.';
        document.getElementById('errorMsg').classList.remove('hidden');
        return;
      }

      // --- Helpers ---
      function $(id) { return document.getElementById(id); }
      function show(id) { $(id).classList.remove('hidden'); }
      function hide(id) { $(id).classList.add('hidden'); }
      function isHidden(id) { return $(id).classList.contains('hidden'); }
      function val(id) { return $(id).value; }
      function setVal(id, v) { $(id).value = v || ''; }

      function addDays(dateStr, n) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return '';
        d.setDate(d.getDate() + n);
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
      }

      // All conditional step IDs in order
      var conditionalSteps = ['step2','step3','step4a','step4b','step5','step6','step7','step8','step9a','step9b'];

      function hideFrom(startId) {
        var found = false;
        conditionalSteps.forEach(function (id) {
          if (id === startId) found = true;
          if (found) hide(id);
        });
      }

      // --- Visibility Logic ---
      function updateVisibility() {
        // Q1
        var hcr = val('hardCopyReceived');
        if (hcr !== 'Received') { hideFrom('step2'); return; }
        show('step2');

        // Q2 -> Q3 (show Q3 once step2 is visible)
        show('step3');

        // Q3
        var scn = val('soCauseNoticeIssued');
        if (!scn) { hideFrom('step4a'); return; }
        if (scn === 'Not Issued') {
          show('step4a');
          hide('step4b'); hide('step5'); hide('step6'); hide('step7'); hide('step8'); hide('step9a'); hide('step9b');
          return;
        }
        // Issued
        hide('step4a');
        show('step4b');
        setVal('targetSoCauseDate', addDays(val('hardCopyReceivedDate'), 15));

        // Q4b -> Q5 (once soCauseNoticeIssuedDate filled)
        var scnDate = val('soCauseNoticeIssuedDate');
        if (!scnDate) { hideFrom('step5'); return; }
        show('step5');
        setVal('dealerReplyTargetDate', addDays(scnDate, 15));

        // Q5 -> Q6
        show('step6');

        // Q6
        var dr = val('dealerReplied');
        if (dr !== 'Yes') { hideFrom('step7'); return; }
        show('step7');

        // Q7 -> Q8
        var drDate = val('dealerReplyReceivedDate');
        if (!drDate) { hideFrom('step8'); return; }
        show('step8');

        // Q8
        var sat = val('dealerReplySatisfactory');
        if (!sat) { hide('step9a'); hide('step9b'); return; }
        if (sat === 'Yes') {
          show('step9a');
          hide('step9b');
          return;
        }
        // No
        hide('step9a');
        show('step9b');
        setVal('speakingOrderTargetDate', addDays(drDate, 15));
        setVal('speakingOrderReplyTargetDate', addDays(val('speakingOrderDate'), 15));

        // File Closer sub-condition
        var fc = val('fileCloser');
        if (fc === 'Yes') show('closingDateWrap'); else hide('closingDateWrap');
      }

      // Attach change/input events to all interactive elements
      ['hardCopyReceived','soCauseNoticeIssued','dealerReplied','dealerReplySatisfactory','fileCloser'].forEach(function (id) {
        $(id).addEventListener('change', updateVisibility);
      });
      ['hardCopyReceivedDate','soCauseNoticeIssuedDate','dealerReplyReceivedDate','speakingOrderDate'].forEach(function (id) {
        $(id).addEventListener('change', updateVisibility);
      });

      // --- Clause Table ---
      $('addClauseRow').addEventListener('click', function () {
        var row = document.createElement('tr');
        row.innerHTML = '<td><input type="text" class="clause-desc"></td><td><input type="text" class="clause-nos"></td><td><input type="text" class="clause-amt"></td>';
        $('clauseTableBody').appendChild(row);
      });

      function getClauseTable() {
        var rows = [];
        $('clauseTableBody').querySelectorAll('tr').forEach(function (tr) {
          var desc = tr.querySelector('.clause-desc').value.trim();
          var nos = tr.querySelector('.clause-nos').value.trim();
          var amt = tr.querySelector('.clause-amt').value.trim();
          if (desc || nos || amt) rows.push({ description: desc, nos: nos, amount: amt });
        });
        return rows;
      }

      function setClauseTable(arr) {
        if (!Array.isArray(arr) || arr.length === 0) return;
        var body = $('clauseTableBody');
        body.innerHTML = '';
        arr.forEach(function (item) {
          var row = document.createElement('tr');
          row.innerHTML = '<td><input type="text" class="clause-desc" value="' + escapeAttr(item.description || '') + '"></td>'
            + '<td><input type="text" class="clause-nos" value="' + escapeAttr(item.nos || '') + '"></td>'
            + '<td><input type="text" class="clause-amt" value="' + escapeAttr(item.amount || '') + '"></td>';
          body.appendChild(row);
        });
      }

      function escapeAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

      // --- All field IDs for save/load ---
      var FIELDS = [
        'hardCopyReceived','hardCopyReceivedDate',
        'soCauseNoticeIssued','closerDateNotIssued',
        'targetSoCauseDate','soCauseNoticeIssuedDate','reminder1','reminder2',
        'dealerReplyTargetDate','dealerReplied','dealerReplyReceivedDate',
        'dealerReplySatisfactory','closerDateSatisfactory',
        'speakingOrderTargetDate','speakingOrderType','speakingOrderDate',
        'remark1','speakingOrderReplyTargetDate',
        'replyFromDealer','replyFromDealerDate',
        'penaltyRecoveryDate','penaltyRecoveryAmount','remark2',
        'fileCloser','closingDate'
      ];

      function collectFormData() {
        var fd = {};
        FIELDS.forEach(function (id) { fd[id] = val(id) || ''; });
        fd.clauseTable = getClauseTable();
        return fd;
      }

      function populateForm(fd) {
        if (!fd) return;
        FIELDS.forEach(function (id) { if (fd[id] != null) setVal(id, fd[id]); });
        if (fd.clauseTable) setClauseTable(fd.clauseTable);
        updateVisibility();
      }

      // --- Load existing ---
      fetch(auth.getApiUrl('/records/' + encodeURIComponent(recordId) + '/communications/by-date?visitDate=' + encodeURIComponent(visitDate)), { headers: auth.getAuthHeaders() })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data && data.formData) populateForm(data.formData);
        })
        .catch(function () {});

      // --- Save ---
      $('communicationForm').addEventListener('submit', function (e) {
        e.preventDefault();
        $('errorMsg').classList.add('hidden');
        $('successMsg').classList.add('hidden');

        var payload = {
          visitDate: visitDate,
          formData: collectFormData()
        };

        fetch(auth.getApiUrl('/records/' + encodeURIComponent(recordId) + '/communications'), {
          method: 'POST',
          headers: auth.getAuthHeaders(),
          body: JSON.stringify(payload)
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }).catch(function () { return { ok: false, data: {} }; }); })
          .then(function (result) {
            if (result.ok) {
              $('successMsg').textContent = 'Saved successfully.';
              $('successMsg').classList.remove('hidden');
              if (window.opener && window.opener.refreshVisitDatesList) window.opener.refreshVisitDatesList();
            } else {
              $('errorMsg').textContent = result.data.error || 'Failed to save.';
              $('errorMsg').classList.remove('hidden');
            }
          })
          .catch(function () {
            $('errorMsg').textContent = 'Network error.';
            $('errorMsg').classList.remove('hidden');
          });
      });
    })();
  </script>
</body>
</html>
