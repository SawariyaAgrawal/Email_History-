<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Email History</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <span>Email History</span>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="upload.html">Upload</a>
      <a href="#" id="logoutLink">Logout</a>
    </div>
  </header>
  <div class="container dashboard-page">
    <h1>Records</h1>
    <div class="filter-bar" id="filterBar">
      <select id="filterZone"><option value="">Select Zone</option></select>
      <select id="filterRO"><option value="">Select RO</option></select>
      <select id="filterArea"><option value="">Select Area</option></select>
      <input type="text" id="searchSAP" placeholder="Search SAP Code...">
      <button type="button" class="btn btn-clear" id="clearFilters">Clear</button>
    </div>
    <p class="empty-state hidden" id="emptyState"></p>
    <div class="table-wrap hidden" id="tableWrap">
      <table>
        <thead id="tableHead">
          <tr></tr>
        </thead>
        <tbody id="recordsTableBody"></tbody>
      </table>
    </div>
    <p class="error-msg hidden" id="errorMsg"></p>
  </div>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      if (!auth.isAuthenticated()) {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('logoutLink').addEventListener('click', function (e) {
        e.preventDefault();
        auth.removeToken();
        window.location.href = 'login.html';
      });

      var tableWrap = document.getElementById('tableWrap');
      var emptyState = document.getElementById('emptyState');
      var errorMsg = document.getElementById('errorMsg');
      var filterZone = document.getElementById('filterZone');
      var filterRO = document.getElementById('filterRO');
      var filterArea = document.getElementById('filterArea');
      var searchSAP = document.getElementById('searchSAP');

      var allRecords = [];

      var COLUMN_RENAME = { 'JDE Distributor Code': 'SAP Code' };
      function displayKey(k) { return COLUMN_RENAME[k] || k; }

      function getSAPCode(d) {
        return String(d['SAP Code'] || d['JDE Distributor Code'] || '');
      }

      function getFiltered() {
        var zone = filterZone.value;
        var ro = filterRO.value;
        var area = filterArea.value;
        var sap = searchSAP.value.trim().toLowerCase();

        return allRecords.filter(function (rec) {
          var d = rec.data || {};
          if (zone && String(d['Zone'] || '').trim() !== zone) return false;
          if (ro && String(d['Region'] || '').trim() !== ro) return false;
          if (area && String(d['Sales Area'] || '').trim() !== area) return false;
          if (sap && getSAPCode(d).toLowerCase().indexOf(sap) === -1) return false;
          return true;
        });
      }

      function applyFilters() {
        var filtered = getFiltered();

        if (filtered.length === 0) {
          emptyState.textContent = 'No records match the current filters.';
          emptyState.classList.remove('hidden');
          tableWrap.classList.add('hidden');
        } else {
          emptyState.classList.add('hidden');
          tableWrap.classList.remove('hidden');
          renderTable(filtered);
        }
      }

      function refreshCascade() {
        var zone = filterZone.value;
        var ro = filterRO.value;

        // RO options: only ROs that exist within the selected zone (or all if no zone)
        var roSet = {};
        allRecords.forEach(function (rec) {
          var d = rec.data || {};
          if (zone && String(d['Zone'] || '').trim() !== zone) return;
          var r = String(d['Region'] || '').trim();
          if (r) roSet[r] = true;
        });
        fillSelect(filterRO, Object.keys(roSet).sort(), 'Select RO');

        // Area options: only areas matching selected zone + RO
        var areaSet = {};
        allRecords.forEach(function (rec) {
          var d = rec.data || {};
          if (zone && String(d['Zone'] || '').trim() !== zone) return;
          if (ro && String(d['Region'] || '').trim() !== ro) return;
          var a = String(d['Sales Area'] || '').trim();
          if (a) areaSet[a] = true;
        });
        fillSelect(filterArea, Object.keys(areaSet).sort(), 'Select Area');
      }

      function populateDropdowns() {
        var zones = {};
        allRecords.forEach(function (rec) {
          var z = String((rec.data || {})['Zone'] || '').trim();
          if (z) zones[z] = true;
        });
        fillSelect(filterZone, Object.keys(zones).sort(), 'Select Zone');
        refreshCascade();
      }

      function fillSelect(el, items, placeholder) {
        var current = el.value;
        el.innerHTML = '<option value="">' + escapeHtml(placeholder) + '</option>';
        items.forEach(function (v) {
          var opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          el.appendChild(opt);
        });
        if (current && items.indexOf(current) !== -1) {
          el.value = current;
        } else {
          el.value = '';
        }
      }

      filterZone.addEventListener('change', function () {
        filterRO.value = '';
        filterArea.value = '';
        refreshCascade();
        applyFilters();
      });
      filterRO.addEventListener('change', function () {
        filterArea.value = '';
        refreshCascade();
        applyFilters();
      });
      filterArea.addEventListener('change', applyFilters);
      searchSAP.addEventListener('input', applyFilters);
      document.getElementById('clearFilters').addEventListener('click', function () {
        filterZone.value = '';
        filterRO.value = '';
        filterArea.value = '';
        searchSAP.value = '';
        refreshCascade();
        applyFilters();
      });

      fetch(auth.getApiUrl('/records'), { headers: auth.getAuthHeaders() })
        .then(function (res) {
          if (res.status === 401) {
            auth.removeToken();
            window.location.href = 'login.html';
            return;
          }
          return res.json();
        })
        .then(function (data) {
          if (!data) return;
          if (data.error) {
            errorMsg.textContent = data.error;
            errorMsg.classList.remove('hidden');
            return;
          }
          allRecords = Array.isArray(data) ? data : [];
          populateDropdowns();
          applyFilters();
        })
        .catch(function () {
          errorMsg.textContent = 'Failed to load records.';
          errorMsg.classList.remove('hidden');
        });

      function renderTable(records) {
        var tableBody = document.getElementById('recordsTableBody');
        var headRow = document.getElementById('tableHead').querySelector('tr');
        tableBody.innerHTML = '';
        if (!records.length) return;
        var allKeys = [];
        records.forEach(function (r) {
          var d = r.data || {};
          Object.keys(d).forEach(function (k) {
            if (allKeys.indexOf(k) === -1) allKeys.push(k);
          });
        });
        if (allKeys.length === 0) allKeys.push('(No columns)');
        headRow.innerHTML = allKeys.map(function (k) { return '<th>' + escapeHtml(displayKey(k)) + '</th>'; }).join('');
        records.forEach(function (record) {
          var d = record.data || {};
          var row = document.createElement('tr');
          row.className = 'record-row';
          row.setAttribute('data-id', record._id);
          row.innerHTML = allKeys.map(function (k) {
            return '<td>' + escapeHtml(String(d[k] != null ? d[k] : '')) + '</td>';
          }).join('');
          row.addEventListener('click', function () {
            window.location.href = 'record.html?id=' + encodeURIComponent(row.getAttribute('data-id'));
          });
          tableBody.appendChild(row);
        });
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }
    })();
  </script>
</body>
</html>
